<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="igedits">
  <defs>
    <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFDC80"/>
      <stop offset="20%" stop-color="#FCAF45"/>
      <stop offset="40%" stop-color="#F56040"/>
      <stop offset="60%" stop-color="#E1306C"/>
      <stop offset="80%" stop-color="#833AB4"/>
      <stop offset="100%" stop-color="#405DE6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#ig-grad)"/>

  <!-- Camera body outline -->
  <rect x="16" y="22" width="68" height="56" rx="12" fill="none" stroke="white" stroke-width="4.5"/>

  <!-- Lens circle -->
  <circle cx="50" cy="50" r="14" fill="none" stroke="white" stroke-width="4"/>

  <!-- Flash dot -->
  <circle cx="74" cy="30" r="4" fill="white"/>

  <!-- "edits" text inside lens area -->
  <text x="50" y="54.5" text-anchor="middle" fill="white" font-family="Arial Black, Arial, sans-serif" font-size="9.5" font-weight="900" letter-spacing="-0.3">edits</text>
</svg>
